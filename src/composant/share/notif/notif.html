<!-- ============================================
     BOUTON NOTIFICATIONS
============================================ -->
<button
  type="button"
  (click)="toggleCenter()"
  (mouseenter)="hoverNotif = true"
  (mouseleave)="hoverNotif = false"
  class="group relative w-12 h-12 rounded-full flex items-center justify-center transition-all duration-300 hover:scale-110 active:scale-95"
>
  <!-- Background -->
  <span 
    class="absolute inset-0 rounded-full transition-all duration-300"
    [ngClass]="hoverNotif ? 'scale-100 opacity-100' : 'scale-0 opacity-0'"
    [ngStyle]="{
      background: 'linear-gradient(135deg, ' + themeservice.primaryHover + ', ' + themeservice.secondaryHover + ')'
    }"
  ></span>

  <!-- Icon -->
  <i
    class="fa-solid fa-bell text-xl relative z-10"
    [ngClass]="{ 'animate-swing': hasUnread() }"
    [ngStyle]="{
      color: hoverNotif ? '#fff' : themeservice.Iconnormal
    }"
  ></i>

  <!-- Badge -->
  <span
    *ngIf="hasUnread()"
    class="absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 flex items-center justify-center rounded-full text-[10px] text-white"
    [ngStyle]="{ backgroundColor: themeservice.primary }"
  >
    {{ unreadCount() > 99 ? '99+' : unreadCount() }}
  </span>
</button>

<!-- ============================================
     OVERLAY
============================================ -->
<div 
  *ngIf="openCenter"
  (click)="toggleCenter()"
  class="fixed inset-0 z-40 backdrop-blur-sm bg-black/50"
></div>

<!-- ============================================
     PANEL
============================================ -->
<div 
  *ngIf="openCenter"
  class="fixed top-0 right-0 h-full w-full sm:w-[420px] z-50 flex flex-col shadow-2xl"
  [ngStyle]="{ backgroundColor: themeservice.Backgroundcards }"
>

  <!-- HEADER -->
  <div 
    class="flex justify-between items-center p-4 text-white"
    [ngStyle]="{
      background: 'linear-gradient(135deg, ' + themeservice.primary + ', ' + themeservice.secondary + ')'
    }"
  >
    <h2 class="font-bold">Notifications</h2>
    <button (click)="toggleCenter()">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>

  <!-- FILTRES -->
  <div class="p-3 flex gap-2 border-b" [ngStyle]="{ borderColor: themeservice.Bordernormal }">
    <button (click)="filter = 'all'" class="px-3 py-1 rounded hover:bg-black/10">Toutes</button>
    <button (click)="filter = 'unread'" class="px-3 py-1 rounded hover:bg-black/10">Non lues</button>
  </div>

  <!-- LIST -->
  <div class="flex-1 overflow-y-auto p-4 space-y-3">

    <!-- EMPTY -->
    <div *ngIf="filteredNotifications.length === 0" class="text-center text-sm opacity-70">
      Aucune notification
    </div>

    <!-- ITEM -->
    <div
      *ngFor="let n of filteredNotifications"
      class="p-4 rounded-xl border cursor-pointer hover:shadow transition"
      [ngClass]="{ 'opacity-60': n.isRead }"
      [ngStyle]="{ borderColor: themeservice.Bordernormal }"
      (click)="!n.isRead && markAsRead(n)"
    >
      <div class="flex justify-between items-start">
        <h3 class="font-semibold text-sm">{{ n.title }}</h3>

        <button (click)="deleteNotification(n); $event.stopPropagation()">
          <i class="fa-solid fa-trash text-red-500"></i>
        </button>
      </div>

      <p class="text-xs mt-1 opacity-80">{{ n.message }}</p>

      <span class="text-[11px] opacity-60">
        {{ n.date | date:'short' }}
      </span>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="p-3 border-t flex gap-2" [ngStyle]="{ borderColor: themeservice.Bordernormal }">

    <button 
      (click)="markAllAsRead()"
      class="flex-1 py-2 text-white rounded hover:opacity-90"
      [ngStyle]="{ backgroundColor: themeservice.primary }"
    >
      Tout lire
    </button>

    <button 
      (click)="clearAll()"
      class="px-3 border rounded text-red-500 hover:bg-red-500/10"
    >
      <i class="fa-solid fa-trash"></i>
    </button>

  </div>
</div>
