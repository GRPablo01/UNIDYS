<app-icon></app-icon>

<!-- NAV GLOBAL -->
<nav class="top-0 transition-all duration-300 relative">

  <!-- ================= DESKTOP ================= -->
  <div class="hidden min-[1243px]:flex px-6 py-3 justify-between items-center max-w-[1600px] mx-auto">

    <!-- MENU PRINCIPAL -->
    <ul class="flex gap-1 items-center">
      <li *ngFor="let item of menu; let i = index" class="relative">

        <!-- ================= LIEN ================= -->
        <a [routerLink]="item.link"
           class="flex items-center gap-2 cursor-pointer select-none px-4 py-2.5 rounded-xl transition-all duration-200 relative overflow-hidden group"
           
           (mouseenter)="hoveredIndex = i; item.children ? openMenuIndex = i : null"
           (mouseleave)="hoveredIndex = -1"

           [ngClass]="{
             'scale-105': hoveredIndex === i || item.active,
             'ring-2 ring-offset-2': item.active
           }"

           [ngStyle]="{
             'color': (hoveredIndex === i || item.active) ? themeService.primary : themeService.Textprincipal,
             'background-color': (hoveredIndex === i || item.active) ? themeService.secondarySoft : 'transparent',
             'ring-color': item.active ? themeService.primary : 'transparent',
             'ring-offset-color': themeService.Backgroundprincipal
           }">

          <!-- Effet hover uniforme -->
          <span class="absolute inset-0 rounded-xl opacity-0 group-hover:opacity-10 transition-opacity duration-300"
                [ngStyle]="{'background-color': themeService.primary}">
          </span>

          <!-- Icône -->
          <i *ngIf="item.icon"
             [class]="item.icon + ' text-md transition-transform duration-200 group-hover:scale-110'"
             [ngStyle]="{
               'color': (hoveredIndex === i || item.active) 
               ? themeService.primary 
               : themeService.Iconnormal
             }">
          </i>

          <!-- Label -->
          <span class="font-medium text-lg">{{ item.label }}</span>

          <!-- Badge -->
          <span *ngIf="item.badge"
                class="ml-1 px-2 py-0.5 text-[10px] font-bold rounded-full text-white animate-pulse shadow-sm"
                [ngStyle]="{'background-color': themeService.accent}">
            {{ item.badge }}
          </span>

          <!-- Chevron -->
          <i *ngIf="item.children"
             class="fas fa-chevron-down ml-1 text-xs transition-all duration-300 cursor-pointer"
             (click)="toggleMenu(i); $event.preventDefault()"
             [class.rotate-180]="openMenuIndex === i"
             [ngStyle]="{
               'color': (hoveredIndex === i || item.active) 
               ? themeService.primary 
               : themeService.Iconnormal
             }">
          </i>

          <!-- Shortcut -->
          <kbd *ngIf="item.shortcut"
               class="ml-2 px-1.5 py-0.5 text-[10px] font-mono rounded border opacity-60"
               [ngStyle]="{
                 'border-color': themeService.Bordernormal,
                 'color': themeService.Textprincipal
               }">
            {{ item.shortcut }}
          </kbd>

        </a>

       <!-- ================= SOUS-MENU ================= -->
<div *ngIf="item.children?.length"
class="absolute left-0 top-full mt-3 w-72 rounded-2xl overflow-hidden shadow-2xl border transition-all duration-300 origin-top-left backdrop-blur-sm z-50"

[ngClass]="{
  'opacity-100 scale-100 translate-y-0 pointer-events-auto': openMenuIndex === i,
  'opacity-0 scale-95 -translate-y-2 pointer-events-none': openMenuIndex !== i
}"

[ngStyle]="{
  'background-color': themeService.Backgroundcards,
  'border-color': themeService.Bordernormal + '40'
}"

(mouseenter)="openMenuIndex = i"
(mouseleave)="openMenuIndex = null">

<!-- HEADER -->
<div class="px-4 py-3 border-b border-opacity-20 flex items-center justify-between"
  [ngStyle]="{'border-color': themeService.Bordernormal}">

<div class="flex flex-col">
 <span class="text-xs font-semibold uppercase opacity-70 tracking-wider"
       [ngStyle]="{'color': themeService.Textprincipal}">
   {{ item.label }}
 </span>

 <span *ngIf="item.description"
       class="text-[11px] opacity-50 mt-0.5"
       [ngStyle]="{'color': themeService.Textprincipal}">
   {{ item.description }}
 </span>
</div>

<i *ngIf="item.icon"
  [class]="item.icon + ' text-sm opacity-40'"
  [ngStyle]="{'color': themeService.Iconnormal}">
</i>

</div>

<!-- ENFANTS -->
<ul class="py-2">
<li *ngFor="let child of item.children; let last = last">

 <a [routerLink]="child.link"
 (click)="child.link && onChildClick(child.link)"
    class="flex items-center gap-3 px-4 py-3 mx-2 rounded-xl transition-all duration-200"
    [ngClass]="{ 'mb-1': !last }"

    (mouseenter)="hoveredChild = child"
    (mouseleave)="hoveredChild = null"

    [ngStyle]="{
      'color': hoveredChild === child || child.active ? '#ffffff' : themeService.Textprincipal,
      'background-color': hoveredChild === child || child.active ? themeService.primary : 'transparent'
    }">

   <!-- Icône -->
   <div class="w-8 h-8 rounded-lg flex items-center justify-center"
        [ngStyle]="{
          'background-color': hoveredChild === child || child.active 
          ? 'rgba(255,255,255,0.2)' 
          : themeService.secondarySoft
        }">

     <i *ngIf="child.icon"
        [class]="child.icon + ' text-sm'"
        [ngStyle]="{
          'color': hoveredChild === child || child.active 
          ? '#ffffff' 
          : themeService.Iconnormal
        }">
     </i>

   </div>

   <!-- TEXTE -->
   <div class="flex flex-col flex-1 min-w-0">
     <span class="font-medium text-sm truncate">
       {{ child.label }}
     </span>

     <span *ngIf="child.description"
           class="text-[11px] opacity-70 truncate"
           [ngStyle]="{
             'color': hoveredChild === child || child.active 
             ? 'rgba(255,255,255,0.8)' 
             : themeService.Textprincipal
           }">
       {{ child.description }}
     </span>
   </div>

   <!-- BADGE -->
   <span *ngIf="child.badge"
         class="px-1.5 py-0.5 text-[9px] font-bold rounded-full text-white"
         [ngStyle]="{'background-color': themeService.accent}">
     {{ child.badge }}
   </span>

 </a>
</li>
</ul>

<!-- FOOTER -->
<div *ngIf="item.footer"
  class="px-4 py-3 border-t border-opacity-20"
  [ngStyle]="{
    'border-color': themeService.Bordernormal,
    'background-color': themeService.secondarySoft + '30'
  }">

<a [routerLink]="item.footer.link"
  class="flex items-center gap-2 text-xs font-medium hover:underline"
  [ngStyle]="{'color': themeService.primary}">

 <span>{{ item.footer.label }}</span>
 <i class="fas fa-arrow-right text-[10px]"></i>

</a>
</div>

</div>

      </li>
    </ul>

    <!-- RIGHT -->
    <div class="flex items-center gap-3">
      <ng-content select="[nav-right]"></ng-content>
    </div>

  </div>
</nav>

<!-- navigation-mobile.component.html -->
<nav class="min-[382px]:flex max-[1243px]:flex min-[1243px]:hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-50">
  <div [ngStyle]="{'background': themeService.Backgroundprincipal,'color': themeService.Textprincipal,
    'border': themeService.primary}"
    class="backdrop-blur-xl border rounded-full px-6 py-3 flex items-center gap-8 shadow-2xl transition-colors duration-300">

    <ng-container *ngFor="let item of menu; let i = index">

      <!-- Items normaux -->
      <a *ngIf="!item.isCenter" [routerLink]="item.link"
        class="group flex flex-col items-center gap-1 transition-all hover:scale-110 duration-200"
        [style.color]="item.active ? themeService.Textprincipal : themeService.Textsecondaire">

        <i class="fa-solid {{item.icon}} text-2xl transition-colors duration-200"
          [ngStyle]="{'color':themeService.Textprincipal}" [class.group-hover:text-primary]="!item.active">
        </i>

        <!-- Texte sous l'icône -->
        <span class="text-xs font-medium transition-colors duration-200"
          [ngStyle]="{'color':themeService.Textsecondaire}">{{item.label}}
        </span>

        <!-- Indicateur actif -->
        <span *ngIf="item.active" class="w-1.5 h-1.5 rounded-full mt-1 animate-pulse"
          [ngStyle]="{'color':themeService.primary}">
        </span>
      </a>
    </ng-container>

  </div>
</nav>
