<!-- Police Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<a routerLink="/accueil">
  <!-- Container Logo -->
  <div class="flex items-center p-3 select-none font-[Inter] transition-all duration-300">

    <!-- Bloc Logo + Texte -->
    <div class="flex items-center gap-3 cursor-pointer group">

      <!-- Logo dynamique selon le thème -->
      <img [src]="themeService.ThemeImage" alt="Logo UniDys"
        class="w-12 h-12 transition-all duration-300 ease-in-out group-hover:scale-110">

      <!-- Nom -->
      <h1 class="text-2xl font-medium tracking-wider transition-colors duration-300"
        [ngStyle]="{'color': themeService.Textprincipal}">
        UNIDYS
      </h1>

    </div>

  </div>
</a>
