<!-- 🔍 BARRE DE RECHERCHE -->
<section class="w-full flex justify-center items-center py-10 relative">
  
  <div class="relative w-full max-w-2xl">

    <!-- 🔎 INPUT CONTAINER -->
    <div 
      class="relative transition-all duration-300"
      [class.scale-[1.02]]="isFocused"
    >

      <!-- Icône recherche -->
      <i [ngStyle]="{'color':themeService.Iconnormal}" class="fa-brands fa-sistrix
                absolute left-4 top-1/2 -translate-y-1/2 
                text-sm">
      </i>

      <!-- INPUT -->
      <input
        #searchInput
        type="text"
        [(ngModel)]="searchText"
        (input)="onSearchChange()"
        (focus)="onFocus()"
        (blur)="onBlur()"
        (keydown)="onKeyDown($event)"
        placeholder="Rechercher cours, jeux..."

        class="w-full pl-12 pr-60 py-3 rounded-2xl outline-none 
               transition-all duration-300 font-medium
               placeholder:opacity-60 backdrop-blur-2xl
               border border-white/20 shadow-lg"

        [ngStyle]="{
          'border': isFocused ? '2px solid ' + themeService.primary : themeService.Bordernormal,
          'background': 'rgba(255,255,255,0.08)',
          'color': themeService.Textprincipal
        }"
      />

      <!-- Bouton clear -->
      <i 
        *ngIf="searchText"
        (click)="searchText=''; onSearchChange()"
        class="fa-solid fa-xmark 
               absolute right-4 top-1/2 -translate-y-1/2 
               text-gray-400 cursor-pointer hover:text-red-400 transition">
      </i>

    </div>

    <!-- 📦 DROPDOWN -->
    <div 
      *ngIf="isFocused && searchText && searchText.trim().length > 0"
      class="absolute w-full mt-3 rounded-2xl shadow-2xl z-50 
             max-h-[400px] overflow-hidden backdrop-blur-xl border"
      [ngStyle]="{
        'background': themeService.Backgroundcards,
        'border': themeService.Bordernormal
      }"
    >

      <!-- 🔎 Suggestions -->
      <div class="max-h-[320px] overflow-y-auto custom-scrollbar py-2">

        <div 
          *ngFor="let item of filteredSuggestions; let i = index"
          (click)="selectItem(item)"
          class="flex items-center gap-3 px-3 py-3 mx-2 rounded-xl 
                 cursor-pointer transition-all duration-200 
                 hover:scale-[1.01] hover:bg-white/10"
        >

          <!-- Image -->
          <div class="w-10 h-10 rounded-lg bg-gray-200 overflow-hidden">
            <img [src]="item.image" class="w-full h-full object-cover" />
          </div>

          <!-- Texte -->
          <div class="flex flex-col flex-1 min-w-0">
            <span class="font-semibold text-sm truncate">
              {{ item.title }}
            </span>
            <span class="text-xs opacity-60 truncate">
              {{ item.description }}
            </span>
          </div>

          <!-- Icône flèche -->
          <i class="fa-solid fa-arrow-right text-xs opacity-50"></i>

        </div>

      </div>

      <!-- ❌ Aucun résultat -->
      <div 
        *ngIf="searchText && searchText.trim().length > 0 && !filteredSuggestions.length"
        class="p-6 text-center text-sm opacity-60 flex flex-col items-center gap-2"
      >
        <i class="fa-regular fa-face-frown text-xl"></i>
        Aucun résultat
      </div>

    </div>

  </div>
</section>

<!-- 🎨 Scrollbar custom -->
<style>
.custom-scrollbar::-webkit-scrollbar {
  width: 6px;
}

.custom-scrollbar::-webkit-scrollbar-thumb {
  background: #94a3b8;
  border-radius: 3px;
}
</style>
