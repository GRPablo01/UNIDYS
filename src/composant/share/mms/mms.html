<!-- ============================================
     BOUTON NEWS - VERSION AMÉLIORÉE
     ============================================ -->
<button type="button" (mouseenter)="hoverNews = true" (mouseleave)="hoverNews = false" (focus)="hoverNews = true"
  (blur)="hoverNews = false"
  class="group relative w-12 h-12 rounded-full flex items-center justify-center transition-all duration-300 ease-out hover:scale-110 active:scale-95"
  [ngStyle]="{ 'focus-ring-color': themeService.primary }"
  [attr.aria-label]="openNews ? 'Fermer les actualités' : 'Ouvrir les actualités'" aria-haspopup="true"
  [attr.aria-expanded]="openNews">
  <!-- Cercle de fond avec effet morphing -->
  <span class="absolute inset-0 rounded-full transition-all duration-300 ease-out" [ngClass]="{ 
         'scale-100 opacity-100': hoverNews, 
         'scale-0 opacity-0': !hoverNews 
       }" [ngStyle]="{
         'background': 'linear-gradient(135deg, ' + themeService.primaryHover + ' 0%, ' + themeService.secondaryHover + ' 100%)',
         'box-shadow': hoverNews ? '0 4px 20px ' + themeService.primaryHover + '40' : 'none'
       }"></span>

  <!-- Icône newspaper avec animation -->
  <i class="fa-solid fa-newspaper text-xl relative z-10 transition-all duration-300 ease-out" [ngStyle]="{ 
         'color': hoverNews ? '#ffffff' : themeService.Iconnormal,
         'transform': hoverNews ? 'scale(1.1)' : 'scale(1)'
       }"></i>
</button>
