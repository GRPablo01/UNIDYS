<!-- 🌟 CONTAINER CONNEXION - Split Screen Design -->
<section [ngStyle]="{'background': themeService.Backgroundprincipal}"
  class="relative w-full min-h-screen overflow-hidden flex items-center justify-center p-4 sm:p-6 lg:p-8">

  <!-- Image de fond avec overlay -->
  <div class="absolute inset-0">
    <img src="assets/BgLogin2.jpg" alt="Fond UniDys" class="w-full h-full object-cover" />
    <div class="absolute inset-0">
    </div>
  </div>

  <!-- ✅ NOTIFICATION TOAST -->
  <div *ngIf="message" class="fixed z-[100] top-4 right-4 left-4 sm:left-auto sm:w-96 animate-slide-in-right"
    role="alert" aria-live="polite">
    <div class="shadow-2xl rounded-2xl overflow-hidden" [ngStyle]="{'background': 'linear-gradient(135deg,' + themeService.primary + ', ' + themeService.primaryHover + ')',
                     'border-left': '4px solid ' + themeService.Textprincipal}">
      <div class="flex items-center gap-3 p-4">
        <div class="flex-shrink-0 w-8 h-8 rounded-full bg-white/20 flex items-center justify-center">
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
        </div>
        <div class="flex-1">
          <h3 class="text-sm font-bold" [ngStyle]="{'color': themeService.Textprincipal}">Bienvenue !</h3>
          <p class="text-xs opacity-90" [ngStyle]="{'color': themeService.Textsecondaire}">{{ message }}</p>
        </div>
        <button (click)="message = null" class="p-1 hover:bg-white/20 rounded-lg transition-colors">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="h-1 w-full bg-white/20">
        <div class="h-full animate-progress-bar origin-left bg-white/60"></div>
      </div>
    </div>
  </div>

  <!-- 🎨 CARTE PRINCIPALE SPLIT SCREEN -->
  <div class="relative z-10 w-full max-w-5xl animate-fade-in-up">
    <div class="flex flex-col lg:flex-row rounded-3xl shadow-2xl overflow-hidden min-h-[600px]"
      [ngStyle]="{'background-color': themeService.Backgroundcards, 'border': themeService.Bordernormal}">

      <!-- 📸 PARTIE GAUCHE - Image -->
      <div class="hidden lg:flex lg:w-1/2 relative overflow-hidden group">
        <img src="assets/BgLogin2.jpg" alt="Illustration UniDys"
          class="w-full h-full object-cover transition-transform duration-700" />
        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
        <div class="absolute inset-0 bg-gradient-to-br from-blue-600/20 to-purple-600/20 mix-blend-overlay"></div>

        <!-- Contenu superposé sur l'image -->
        <div class="absolute bottom-0 left-0 right-0 p-8 text-white">
          <div class="mb-4">
            <h1 class="text-4xl font-bold mb-2 tracking-tight">UniDys</h1>
            <p class="text-lg opacity-90 font-light">Plateforme éducative inclusive</p>
          </div>
          <div class="flex items-center gap-4 text-sm opacity-80">
            <div class="flex items-center gap-2">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              <span>Accessibilité</span>
            </div>
            <div class="flex items-center gap-2">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
              </svg>
              <span>Pédagogie adaptée</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 🔐 PARTIE DROITE - Formulaire -->
      <div class="w-full lg:w-1/2 p-6 sm:p-8 lg:p-12 flex flex-col justify-center relative">

        <!-- Header mobile (visible uniquement sur mobile) -->
        <div class="lg:hidden text-center mb-6">
          <h1 class="text-2xl font-bold mb-1" [ngStyle]="{'color': themeService.Textprincipal}">UniDys</h1>
          <p class="text-sm" [ngStyle]="{'color': themeService.Textsecondaire}">Plateforme éducative inclusive</p>
        </div>

        <!-- Bouton thème -->
        <div class="absolute top-4 right-4 lg:top-6 lg:right-6">
          <button (click)="toggleTheme()"
            class="w-10 h-10 rounded-full flex items-center justify-center border transition-all duration-300 hover:scale-110 shadow-md"
            [ngStyle]="{'background-color': themeService.Backgroundcards, 'border-color': themeService.Bordernormal}">
            <ng-container *ngIf="isDarkMode$ | async; else sunIcon">
              <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                [attr.stroke]="themeService.primary">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z" />
              </svg>
            </ng-container>
            <ng-template #sunIcon>
              <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                [attr.stroke]="themeService.primary">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 3v2m0 14v2m9-9h-2M5 12H3m15.364-6.364l-1.414 1.414M6.05 17.95l-1.414 1.414M17.95 17.95l-1.414-1.414M6.05 6.05L4.636 7.464M12 8a4 4 0 100 8 4 4 0 000-8z" />
              </svg>
            </ng-template>
          </button>
        </div>

        <!-- Titre -->
        <div class="mb-8 text-center lg:text-left">
          <h2 class="text-2xl sm:text-3xl font-bold mb-2" [ngStyle]="{'color': themeService.Textprincipal}">Connexion
          </h2>
          <p class="text-sm" [ngStyle]="{'color': themeService.Textsecondaire}">Accédez à votre espace personnel</p>
        </div>

        <!-- Formulaire -->
        <form (ngSubmit)="valider()" #connexionForm="ngForm" class="space-y-5">

          <!-- Email -->
          <div class="space-y-1.5">
            <label class="block text-xs font-semibold ml-1" [ngStyle]="{'color': themeService.Textsecondaire}">
              Adresse e-mail
            </label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="h-5 w-5 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                  [attr.stroke]="themeService.Iconnormal">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                </svg>
              </div>
              <input type="email" id="email" name="email" required [(ngModel)]="connexionData.email" #email="ngModel"
                placeholder="Votre Mail"
                [ngStyle]="{'background-color': themeService.Backgroundcards, 'border': themeService.Bordernormal, 'color': themeService.Textprincipal}"
                class="w-full pl-10 pr-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-opacity-50 transition-all duration-300 hover:border-opacity-70" />
            </div>
          </div>

          <!-- Mot de passe -->
          <div class="space-y-1.5">
            <label class="block text-xs font-semibold ml-1" [ngStyle]="{'color': themeService.Textsecondaire}">
              Mot de passe
            </label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                  [attr.stroke]="themeService.Iconnormal">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
              </div>
              <input [type]="passwordVisible ? 'text' : 'password'" id="password" name="password" required minlength="6"
                [(ngModel)]="connexionData.password" #password="ngModel" placeholder="Votre Password"
                [ngStyle]="{'background-color': themeService.Backgroundcards, 'border': themeService.Bordernormal, 'color': themeService.Textprincipal}"
                class="w-full pl-10 pr-12 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-opacity-50 transition-all duration-300 hover:border-opacity-70" />

              <button type="button" (click)="togglePasswordVisibility()"
                class="absolute right-3 top-1/2 -translate-y-1/2 p-1.5 rounded-lg transition-colors hover:bg-gray-100/10">
                <svg *ngIf="!passwordVisible" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                  [attr.stroke]="themeService.Iconnormal">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
                <svg *ngIf="passwordVisible" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                  [attr.stroke]="themeService.Iconnormal">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                </svg>
              </button>
            </div>
          </div>

          <!-- Options -->
          <!-- <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" class="w-4 h-4 rounded border-gray-300 focus:ring-2 focus:ring-offset-0"
                     [ngStyle]="{'accent-color': themeService.primary}"/>
              <span [ngStyle]="{'color': themeService.Textsecondaire}">Se souvenir de moi</span>
            </label>
            <a routerLink="/mot-de-passe-oublie" 
               [ngStyle]="{'color': themeService.secondary}"
               class="hover:underline font-medium transition-colors text-xs sm:text-sm">
              Mot de passe oublié ?
            </a>
          </div> -->

          <!-- Erreur serveur -->
          <div *ngIf="errorMessage" role="alert"
            [ngStyle]="{'background-color': themeService.primarySoft, 'color': themeService.Textprincipal, 'border-color': themeService.primary}"
            class="border rounded-xl p-3 text-sm flex items-center gap-2 animate-shake">
            <svg class="h-5 w-5 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd"
                d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                clip-rule="evenodd" />
            </svg>
            <span>{{ errorMessage }}</span>
          </div>

          <!-- Bouton connexion -->
          <button type="submit" [disabled]="isLoading"
            class="w-full py-3.5 rounded-xl font-semibold text-sm shadow-lg transform transition-all duration-300 hover:scale-[1.02] hover:shadow-xl disabled:opacity-70 disabled:cursor-not-allowed flex items-center justify-center gap-2 relative overflow-hidden"
            [style.background]="'linear-gradient(135deg, ' + themeService.Fondboutonprincipal + ' 0%, ' + adjustColor(themeService.Fondboutonprincipal, -20) + ' 100%)'"
            [style.color]="themeService.Textprincipal">

            <!-- Effet shimmer -->
            <div
              class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full hover:translate-x-full transition-transform duration-700 ease-in-out">
            </div>

            <svg *ngIf="isLoading" class="animate-spin h-5 w-5 relative z-10" xmlns="http://www.w3.org/2000/svg"
              fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
              </path>
            </svg>

            <span *ngIf="!isLoading" class="relative z-10">Se connecter</span>
            <span *ngIf="isLoading" class="relative z-10">Connexion...</span>
          </button>



          <!-- Lien inscription -->
          <div class="text-center">
            <p [ngStyle]="{'color': themeService.Textsecondaire}" class="text-sm">
              Pas encore de compte ?
              <a routerLink="/inscription" [ngStyle]="{'color': themeService.primary}"
                class="font-semibold hover:underline ml-1 transition-colors">
                S'inscrire
              </a>
            </p>
          </div>

          <!-- Footer -->
          <div class="mt-6 text-center">
            <p class="text-xs opacity-60" [ngStyle]="{'color': themeService.Textprincipal}">
              © 2024 UniDys. Tous droits réservés.
            </p>
          </div>

        </form>
      </div>
    </div>


  </div>
</section>

<!-- Styles animations -->
<style>
  @keyframes slow-zoom {

    0%,
    100% {
      transform: scale(1);
    }

    50% {
      transform: scale(1.05);
    }
  }

  .animate-slow-zoom {
    animation: slow-zoom 20s ease-in-out infinite;
  }

  @keyframes fade-in-up {
    from {
      opacity: 0;
      transform: translateY(20px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .animate-fade-in-up {
    animation: fade-in-up 0.6s ease-out;
  }

  @keyframes shake {

    0%,
    100% {
      transform: translateX(0);
    }

    25% {
      transform: translateX(-5px);
    }

    75% {
      transform: translateX(5px);
    }
  }

  .animate-shake {
    animation: shake 0.4s ease-in-out;
  }

  @keyframes slide-in-right {
    from {
      opacity: 0;
      transform: translateX(100%);
    }

    to {
      opacity: 1;
      transform: translateX(0);
    }
  }

  .animate-slide-in-right {
    animation: slide-in-right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes progress-bar {
    from {
      transform: scaleX(1);
    }

    to {
      transform: scaleX(0);
    }
  }

  .animate-progress-bar {
    animation: progress-bar 5s linear forwards;
  }

  /* Focus ring dynamique basé sur la couleur primaire */
  input:focus {
    --tw-ring-color: var(--primary-color, #3b82f6);
  }
</style>
